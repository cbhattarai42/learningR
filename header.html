<script type="module">
import { WebR } from 'https://webr.r-wasm.org/latest/webr.mjs';

const webR = new WebR();
let webRReady = false;

/* ── Boot ─────────────────────────────────────────────────────── */
(async () => {
  try {
    await webR.init();
    webRReady = true;
    const dot  = document.getElementById('nav-dot');
    const txt  = document.getElementById('nav-status-text');
    if (dot) { dot.className = 'nav-dot ready'; }
    if (txt) { txt.textContent = 'R ready'; }
  } catch(e) {
    const txt = document.getElementById('nav-status-text');
    if (txt) txt.textContent = 'R failed';
  }
})();

/* ── Helpers ──────────────────────────────────────────────────── */
function esc(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Core runner ──────────────────────────────────────────────── */
async function runCode(id, btn) {
  if (!webRReady) { alert('R is still loading — please wait a moment.'); return; }

  const editor  = document.getElementById('editor-' + id);
  const outWrap = document.getElementById('out-' + id);
  const textEl  = outWrap.querySelector('.output-text');
  const plotEl  = outWrap.querySelector('.output-plot');
  const code    = editor.value;

  outWrap.style.display = 'block';
  textEl.innerHTML = '<span class="out-wait">Running…</span>';
  if (plotEl) plotEl.innerHTML = '';

  const orig = btn.textContent;
  btn.disabled = true;
  btn.textContent = '⟳';

  try {
    const shelter = await new webR.Shelter();
    let result;
    try {
      result = await shelter.captureR(code, {
        withAutoprint: true, captureStreams: true, captureConditions: true
      });
    } finally { shelter.purge(); }

    const lines = (result.output || []).map(item => {
      if (item.type === 'stderr' || item.type === 'error')
        return `<span class="r-err">${esc(item.data)}</span>`;
      if (item.type === 'message')
        return `<span class="r-warn">${esc(item.data)}</span>`;
      return esc(item.data);
    }).join('\n');

    textEl.innerHTML = lines || '<span class="out-wait">(no output)</span>';

    if (plotEl && result.images && result.images.length > 0) {
      for (const img of result.images) {
        const c = document.createElement('canvas');
        c.width = img.width; c.height = img.height;
        c.getContext('2d').drawImage(img, 0, 0);
        plotEl.appendChild(c);
      }
    }
  } catch(err) {
    textEl.innerHTML = `<span class="r-err">Error: ${esc(err.message)}</span>`;
  } finally {
    btn.disabled = false;
    btn.textContent = orig;
  }
}

function toggleHint(id) {
  const box = document.getElementById('hint-' + id);
  const btn = document.getElementById('hbtn-' + id);
  const vis = box.style.display === 'block';
  box.style.display = vis ? 'none' : 'block';
  btn.textContent   = vis ? '💡 Show hint' : '🙈 Hide hint';
}

window.runWebR    = runCode;
window.toggleHint = toggleHint;

/* ── Scrollspy — highlight active nav link ────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  const sections = document.querySelectorAll('.chapter');
  const links    = document.querySelectorAll('.nav-link');

  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        links.forEach(l => l.classList.remove('active'));
        const link = document.querySelector(`.nav-link[data-ch="${e.target.id}"]`);
        if (link) link.classList.add('active');
      }
    });
  }, { threshold: 0.25 });

  sections.forEach(s => obs.observe(s));
});
</script>
