# .github/workflows/deploy.yml
# ─────────────────────────────────────────────────────────────────────────────
# Automatically renders index.Rmd → index.html and deploys to GitHub Pages
# whenever you push to the main branch.
#
# No R installation needed on your local machine!
# GitHub does all the rendering in the cloud for free.
# ─────────────────────────────────────────────────────────────────────────────

name: Render & Deploy to GitHub Pages

on:
  push:
    branches: [main]          # triggers on every push to main
  workflow_dispatch:           # also allows manual trigger from GitHub UI

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group:  pages
  cancel-in-progress: true

jobs:
  render-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install R (fast — uses cache)
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'
          use-public-rspm: true   # faster package installs

      # 3. Install required R packages (rmarkdown + deps)
      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::rmarkdown
            any::knitr
            any::htmltools

      # 4. Render index.Rmd → index.html
      - name: Render R Markdown
        run: |
          Rscript -e "rmarkdown::render('index.Rmd', output_file = 'index.html')"

      # 5. Configure GitHub Pages
      - name: Configure Pages
        uses: actions/configure-pages@v4

      # 6. Upload the rendered HTML (and CSS/assets) as a Pages artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'       # upload the whole repo root (includes index.html, style.css, etc.)

      # 7. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
